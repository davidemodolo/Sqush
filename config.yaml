# QuantStar — Qwen3.6-27B quantized inference
model:
  repo: "Qwen/Qwen3.6-27B"
  cache_dir: "./models"
  torch_dtype: "bfloat16"
  attn_implementation: "sdpa"   # load-time value; quantize.py overrides to "quantstar" (blockwise GQA) post-load.
  # 4-bit weights via bitsandbytes NF4 quantization

quantization:
  weight_bits: 4          # 4 = bitsandbytes NF4; 2/3 need offline quantized model
  kv_cache_bits: 4        # KV cache quantization bits

inference:
  max_context: 262144     # full 256k — verified ~21.1 GB peak (4-bit KV ~4.3GB + 4-bit weights ~16.4GB + blockwise transient)
  max_new_tokens: 65536
  temperature: 0.7
  top_p: 0.8
  top_k: 20
  presence_penalty: 1.5

server:
  host: "127.0.0.1"
  port: 9898

logging:
  level: "INFO"
