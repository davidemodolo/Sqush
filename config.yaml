# QuantStar configuration
# model.repo and inference.max_context are set by the --vram profile (8 GB → 9B/128k, 24 GB → 27B/256k).
# Override them here only if you need a custom model or context length.
model:
  cache_dir: "./models"
  torch_dtype: "bfloat16"
  attn_implementation: "sdpa"

quantization:
  weight_bits: 4
  kv_cache_bits: 4

inference:
  max_new_tokens: 65536
  temperature: 0.7
  top_p: 0.8
  top_k: 20
  presence_penalty: 1.5

server:
  host: "127.0.0.1"
  port: 9898

logging:
  level: "INFO"
